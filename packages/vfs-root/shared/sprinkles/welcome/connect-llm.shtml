<html lang="en">
  <head>
    <title>Connect an LLM</title>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--s2-font-family, -apple-system, BlinkMacSystemFont, sans-serif);
        font-size: 13px;
        color: var(--s2-content-default, #e8e8e8);
        background: transparent;
      }
      .step { display: none; animation: fadeUp 0.18s ease both; }
      .step.active { display: block; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .step-heading {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      .step-sub {
        font-size: 12px;
        color: var(--s2-content-secondary, #a1a1a1);
        margin-top: 4px;
      }

      /* Provider list — responsive grid that adapts to the dip width.
         Each cell is at least ~180px so labels stay readable; the
         browser flows extra columns automatically when there's room. */
      .providers {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 6px;
        margin-top: 14px;
      }
      .provider {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 10px;
        background: var(--s2-bg-elevated, #2c2c2c);
        border: 1px solid var(--s2-border-subtle, #3a3a3a);
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
        min-width: 0;
      }
      .provider:hover {
        background: var(--s2-bg-layer-2, #252525);
        border-color: var(--s2-accent, #3562ff);
      }
      .provider > div {
        min-width: 0;
        flex: 1 1 auto;
      }
      .provider__name {
        font-weight: 600;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .provider__chevron {
        color: var(--s2-content-secondary, #a1a1a1);
        font-size: 14px;
        flex: 0 0 auto;
      }

      /* Credential form */
      .form {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .form label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--s2-content-secondary, #a1a1a1);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .form input[type="text"],
      .form input[type="password"],
      .form select {
        width: 100%;
        height: 32px;
        padding: 0 10px;
        border-radius: 8px;
        border: 1px solid var(--s2-border-default, #4a4a4a);
        background: var(--s2-bg-elevated, #2c2c2c);
        color: var(--s2-content-default, #e8e8e8);
        font-family: inherit;
        font-size: 13px;
        line-height: 1.4;
        outline: none;
        transition: border-color 0.12s, box-shadow 0.12s;
      }
      .form input[type="text"]:focus,
      .form input[type="password"]:focus,
      .form select:focus {
        border-color: var(--s2-accent, #3562ff);
        box-shadow: 0 0 0 1px var(--s2-accent, #3562ff);
      }
      .form input[type="text"]::placeholder,
      .form input[type="password"]::placeholder {
        color: var(--s2-content-tertiary, #717171);
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        align-items: center;
      }
      .actions .spacer { flex: 1; }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 32px;
        padding: 0 14px;
        border-radius: 9999px;
        background: transparent;
        border: 1px solid var(--s2-border-default, #4a4a4a);
        color: var(--s2-content-default, #e8e8e8);
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:hover { background: color-mix(in srgb, var(--s2-content-default) 6%, transparent); }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .btn--primary {
        background: var(--s2-accent, #3562ff);
        border-color: var(--s2-accent, #3562ff);
        color: white;
      }
      .btn--primary:hover { filter: brightness(1.05); }

      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }
      .status.busy { color: var(--s2-content-secondary, #a1a1a1); }
      .status.ok { color: var(--s2-positive, #3aa763); }
      .status.warn { color: var(--s2-notice, #d49d10); }
      .status.error { color: var(--s2-negative, #c83a3a); }

      .meta {
        font-size: 11px;
        color: var(--s2-content-secondary, #a1a1a1);
        margin-top: 6px;
      }
      .field-help {
        font-size: 11px;
        color: var(--s2-content-secondary, #a1a1a1);
        margin-top: 6px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <!-- Step 1: pick provider -->
    <section id="sProvider" class="step active">
      <div class="step-heading">Pick an LLM provider</div>
      <div class="step-sub">All accounts you've configured stay editable later in Settings.</div>
      <div id="providerList" class="providers"></div>
    </section>

    <!-- Step 2: credentials -->
    <section id="sCreds" class="step">
      <div class="step-heading">
        Connect to <span id="providerName">…</span>
      </div>
      <div class="step-sub" id="providerDesc"></div>
      <div class="form">
        <div id="apiKeyRow">
          <label for="apiKeyIn" id="apiKeyLabel">API Key</label>
          <input id="apiKeyIn" type="password" autocomplete="off" spellcheck="false" placeholder="sk-…" />
        </div>
        <div id="baseUrlRow" hidden>
          <label for="baseUrlIn">Base URL</label>
          <input id="baseUrlIn" type="text" autocomplete="off" spellcheck="false" placeholder="https://…" />
          <div id="baseUrlHelp" class="field-help" hidden></div>
        </div>
        <div id="deploymentRow" hidden>
          <label for="deploymentIn">Deployment</label>
          <input id="deploymentIn" type="text" autocomplete="off" spellcheck="false" placeholder="deployment-name" />
          <div id="deploymentHelp" class="field-help" hidden></div>
        </div>
        <div id="apiVersionRow" hidden>
          <label for="apiVersionIn">API Version</label>
          <input id="apiVersionIn" type="text" autocomplete="off" spellcheck="false" placeholder="api-version" />
          <div id="apiVersionHelp" class="field-help" hidden></div>
        </div>
      </div>
      <div id="status" class="status"></div>
      <div class="actions">
        <button id="backBtn" class="btn" type="button">Back</button>
        <span class="spacer"></span>
        <button id="connectBtn" class="btn btn--primary" type="button">Connect</button>
      </div>
      <div class="meta" id="meta"></div>
    </section>

    <!-- Step 3: success -->
    <section id="sDone" class="step">
      <div class="step-heading">Connected.</div>
      <div class="step-sub" id="doneSub">Booting your model…</div>
    </section>

    <script>
      // Provider catalogue is injected by the parent via slicc-message.
      // Until it arrives we render a tiny placeholder. Model selection
      // intentionally lives in the chat header (not the dip), so we
      // ignore the `models` map and never surface it here.
      var providers = [];
      var current = { provider: null, providerConfig: null };

      var providerListEl = document.getElementById('providerList');
      var providerNameEl = document.getElementById('providerName');
      var providerDescEl = document.getElementById('providerDesc');
      var apiKeyRow = document.getElementById('apiKeyRow');
      var apiKeyLabelEl = document.getElementById('apiKeyLabel');
      var apiKeyIn = document.getElementById('apiKeyIn');
      var baseUrlRow = document.getElementById('baseUrlRow');
      var baseUrlIn = document.getElementById('baseUrlIn');
      var baseUrlHelpEl = document.getElementById('baseUrlHelp');
      var deploymentRow = document.getElementById('deploymentRow');
      var deploymentIn = document.getElementById('deploymentIn');
      var deploymentHelpEl = document.getElementById('deploymentHelp');
      var apiVersionRow = document.getElementById('apiVersionRow');
      var apiVersionIn = document.getElementById('apiVersionIn');
      var apiVersionHelpEl = document.getElementById('apiVersionHelp');
      var statusEl = document.getElementById('status');
      var connectBtn = document.getElementById('connectBtn');
      var backBtn = document.getElementById('backBtn');
      var metaEl = document.getElementById('meta');

      function setHelpText(el, text) {
        if (text) {
          el.textContent = text;
          el.hidden = false;
        } else {
          el.textContent = '';
          el.hidden = true;
        }
      }

      function renderProviders() {
        providerListEl.innerHTML = '';
        if (!providers.length) {
          var empty = document.createElement('div');
          empty.className = 'meta';
          empty.textContent = 'Loading providers…';
          providerListEl.appendChild(empty);
          return;
        }
        providers.forEach(function (p) {
          var row = document.createElement('div');
          row.className = 'provider';
          row.dataset.providerId = p.id;
          var info = document.createElement('div');
          var name = document.createElement('div');
          name.className = 'provider__name';
          name.textContent = p.name;
          info.appendChild(name);
          // Show meaningful descriptions only as a hover tooltip so the
          // grid rows stay a uniform height. Skip auto-generated
          // `<id> provider` strings — they repeat the id and add no info.
          var fallbackDesc = (p.id || '') + ' provider';
          if (p.description && p.description !== fallbackDesc) {
            row.title = p.description;
          }
          row.appendChild(info);
          var chev = document.createElement('span');
          chev.className = 'provider__chevron';
          chev.textContent = '›';
          row.appendChild(chev);
          row.onclick = function () { selectProvider(p); };
          providerListEl.appendChild(row);
        });
      }

      function go(stepId) {
        ['sProvider', 'sCreds', 'sDone'].forEach(function (id) {
          document.getElementById(id).classList.toggle('active', id === stepId);
        });
      }

      function selectProvider(p) {
        current.provider = p.id;
        current.providerConfig = p;
        providerNameEl.textContent = p.name;
        // Suppress auto-generated `<id> provider` descriptions.
        var fallback = (p.id || '') + ' provider';
        providerDescEl.textContent =
          p.description && p.description !== fallback ? p.description : '';
        statusEl.className = 'status';
        statusEl.textContent = '';
        metaEl.textContent = '';

        // ── API key field ─────────────────────────────────────────
        apiKeyIn.value = '';
        // Mirror the Settings → Add Account dialog's "API Key (ENVVAR):"
        // label so users see which env-var SLICC will read on import.
        apiKeyLabelEl.textContent =
          'API Key' + (p.apiKeyEnvVar ? ' (' + p.apiKeyEnvVar + ')' : '');
        apiKeyIn.placeholder = p.apiKeyPlaceholder || 'sk-…';

        // ── Base URL field ────────────────────────────────────────
        // `defaultBaseUrl` on the catalogue is the provider's
        // `baseUrlPlaceholder` — a UI hint like
        // `https://your-resource.cognitiveservices.azure.com/` or
        // `https://your-proxy.example.com`. It is NOT a real default
        // and must not be sent back as the user's value. Mirror the
        // settings dialog and use it only as the HTML placeholder.
        baseUrlRow.hidden = !p.requiresBaseUrl;
        baseUrlIn.value = '';
        baseUrlIn.placeholder = p.defaultBaseUrl || 'https://…';
        setHelpText(baseUrlHelpEl, p.requiresBaseUrl ? p.baseUrlDescription || '' : '');

        // ── Deployment field ──────────────────────────────────────
        deploymentRow.hidden = !p.requiresDeployment;
        deploymentIn.value = '';
        deploymentIn.placeholder = p.deploymentPlaceholder || 'deployment-name';
        setHelpText(
          deploymentHelpEl,
          p.requiresDeployment ? p.deploymentDescription || '' : ''
        );

        // ── API version field ─────────────────────────────────────
        apiVersionRow.hidden = !p.requiresApiVersion;
        apiVersionIn.value = p.apiVersionDefault || '';
        apiVersionIn.placeholder = p.apiVersionDefault || 'api-version';
        setHelpText(
          apiVersionHelpEl,
          p.requiresApiVersion ? p.apiVersionDescription || '' : ''
        );

        // OAuth providers delegate everything to a popup login flow
        // handled by the host page. The dip just emits an
        // `oauth-attempt` and waits for `slicc-connect-result`.
        var isOAuth = !!p.isOAuth;
        apiKeyRow.hidden = isOAuth;
        // OAuth + per-provider extras don't combine in the settings
        // dialog either, so hide deployment/api-version on OAuth
        // providers regardless of catalogue flags.
        if (isOAuth) {
          deploymentRow.hidden = true;
          apiVersionRow.hidden = true;
        }

        connectBtn.disabled = false;
        connectBtn.textContent = isOAuth ? 'Login with ' + p.name : 'Connect';
        go('sCreds');
        if (!isOAuth) setTimeout(function () { apiKeyIn.focus(); }, 60);
      }

      backBtn.onclick = function () { go('sProvider'); };

      connectBtn.onclick = function () {
        var p = current.providerConfig || {};
        if (p.isOAuth) {
          connectBtn.disabled = true;
          connectBtn.textContent = 'Opening login…';
          statusEl.className = 'status busy';
          statusEl.textContent = 'Opening ' + (p.name || current.provider) + ' login window…';
          slicc.lick({
            action: 'oauth-attempt',
            data: {
              provider: current.provider,
              baseUrl: (baseUrlIn.value || '').trim() || null,
            },
          });
          return;
        }
        var key = (apiKeyIn.value || '').trim();
        if (p.requiresApiKey !== false && !key) {
          statusEl.className = 'status error';
          statusEl.textContent = 'Please enter an API key.';
          apiKeyIn.focus();
          return;
        }
        var baseUrlVal = (baseUrlIn.value || '').trim();
        if (p.requiresBaseUrl && !baseUrlVal) {
          statusEl.className = 'status error';
          statusEl.textContent = 'Please enter a base URL.';
          baseUrlIn.focus();
          return;
        }
        var deploymentVal = (deploymentIn.value || '').trim();
        if (p.requiresDeployment && !deploymentVal) {
          statusEl.className = 'status error';
          statusEl.textContent = 'Please enter a deployment name.';
          deploymentIn.focus();
          return;
        }
        var apiVersionVal = (apiVersionIn.value || '').trim();
        connectBtn.disabled = true;
        connectBtn.textContent = 'Validating…';
        statusEl.className = 'status busy';
        statusEl.textContent = 'Talking to ' + (p.name || current.provider) + '…';
        slicc.lick({
          action: 'connect-attempt',
          data: {
            provider: current.provider,
            apiKey: key,
            baseUrl: baseUrlVal || null,
            deployment: deploymentVal || null,
            apiVersion: apiVersionVal || null,
            // Model picking is handled by the chat header dropdown,
            // not by the welcome dip — leave it null so the
            // orchestrator preserves whatever model the user (or
            // provider defaults) has already chosen.
            model: null,
          },
        });
      };

      function submitOnEnter(e) {
        if (e.key === 'Enter') connectBtn.click();
      }
      apiKeyIn.addEventListener('keydown', submitOnEnter);
      baseUrlIn.addEventListener('keydown', submitOnEnter);
      deploymentIn.addEventListener('keydown', submitOnEnter);
      apiVersionIn.addEventListener('keydown', submitOnEnter);

      // Listen for parent → dip messages.
      document.addEventListener('slicc-message', function (e) {
        var msg = e.detail || {};
        if (msg.type === 'slicc-providers') {
          providers = (msg.providers || []).slice();
          // The dip used to read `msg.models` to populate a per-provider
          // model dropdown; that responsibility now lives in the chat
          // header so we deliberately ignore the models map.
          renderProviders();
        } else if (msg.type === 'slicc-already-connected') {
          // Reload of a chat that already finished onboarding —
          // skip the provider list entirely and show a finished card.
          go('sDone');
          var doneSub = document.getElementById('doneSub');
          if (doneSub) {
            doneSub.textContent = msg.note || 'Already connected.';
          }
        } else if (msg.type === 'slicc-connect-result') {
          if (msg.ok) {
            connectBtn.textContent = 'Connected';
            statusEl.className = 'status ok';
            statusEl.textContent = msg.note || 'Connected.';
            go('sDone');
          } else {
            connectBtn.disabled = false;
            connectBtn.textContent = 'Try again';
            statusEl.className = 'status ' + (msg.kind === 'skipped' ? 'warn' : 'error');
            statusEl.textContent = msg.message || 'Could not save credentials.';
          }
        }
      });

      // Tell the parent we're ready so it can flush the provider catalogue.
      slicc.lick({ action: 'connect-ready' });
      renderProviders();
    </script>
  </body>
</html>
