<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>slicc capture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 16px 18px;
        user-select: none;
        overflow: hidden;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #e94560;
        animation: pulse 1.5s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .dot--error {
        background: #ff6b6b;
        animation: none;
      }
      .label {
        font-size: 13px;
        flex: 1;
      }
      .hint {
        font-size: 11px;
        color: #6a6a8a;
        margin-top: 8px;
        line-height: 1.4;
      }
      .action {
        display: none;
        margin-top: 14px;
        padding: 8px 14px;
        font-size: 13px;
        color: #fff;
        background: #4f6df5;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .action:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="dot" id="dot"></div>
      <div class="label" id="label">Preparing capture…</div>
    </div>
    <div class="hint" id="hint"></div>
    <button class="action" id="action" type="button"></button>
    <script src="capture-popup.js"></script>
  </body>
</html>
