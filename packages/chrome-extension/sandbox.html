<!DOCTYPE html>
<html>
<head>
<script>
/**
 * SLICC Code Execution Sandbox
 *
 * This is a Chrome manifest-declared sandbox page (CSP-exempt by design).
 * It runs JavaScript code authored by the user through the AI coding agent,
 * similar to a browser DevTools console or REPL.
 *
 * Security model:
 * - Code originates from user-directed AI agent actions, NOT from remote servers
 * - The sandbox communicates with the parent page ONLY via postMessage
 * - The sandbox can only access the virtual filesystem (VFS) through the bridge
 * - It has no access to chrome.* APIs, cookies, or browsing data
 * - Full HTML documents are rendered in a nested iframe with sandbox="allow-scripts"
 *
 * This pattern is used by Chrome DevTools, CodePen, and similar developer tools.
 *
 * Two protocols coexist here:
 * 1. **Legacy shared protocol** (har_filter, exec, vfs, fetch_proxy): one
 *    iframe shared across the offscreen document; messages route via
 *    `parent.postMessage` and a single `window.message` listener with
 *    id-keyed routing. Still used by HAR filtering and the JavaScript tool's
 *    one-off `exec` requests.
 * 2. **Per-task realm protocol** (`realm-init`, `realm-rpc-req`,
 *    `realm-done`, `realm-error`): one iframe per task with a paired
 *    `MessageChannel` handed in at load. The iframe announces itself
 *    via `realm-iframe-ready`, the host transfers a `MessagePort` via
 *    `realm-port-init`, and all subsequent traffic flows over that port —
 *    isolating concurrent realms. Used by `node -e`, `.jsh`, and any
 *    future hard-killable JS execution.
 */
const pendingVfs = new Map();
const pendingFetch = new Map();
let vfsIdCounter = 0;
let fetchIdCounter = 0;

// ── Fetch proxy ──────────────────────────────────────────────────────────
// In extension sandbox mode, cross-origin fetch is blocked by CORS (null origin).
// Route through parent page via postMessage — parent has host_permissions.
const _origFetch = window.fetch.bind(window);

function proxiedFetch(input, init) {
  const url = typeof input === 'string' ? input : input instanceof URL ? input.toString() : input.url;
  let parsed;
  try { parsed = new URL(url, location.origin); } catch { return _origFetch(input, init); }
  // Same-origin requests can go direct
  if (parsed.origin === location.origin) return _origFetch(input, init);

  // Cross-origin: proxy through parent page
  return new Promise((resolve, reject) => {
    const id = 'fp-' + (++fetchIdCounter);
    pendingFetch.set(id, { resolve, reject });
    // Pass headers through as-is. In extension mode the parent handler calls
    // fetch(url, init) directly (not through /api/fetch-proxy), so there is no
    // server-side decoder for encoded headers. Cookie headers will be stripped
    // by the browser's fetch() API. Cookie-based auth in extension mode
    // requires playwright-cli eval.
    const encodedHeaders = init && init.headers
      ? Object.fromEntries(new Headers(init.headers).entries())
      : undefined;
    parent.postMessage({
      type: 'fetch_proxy',
      id,
      url,
      init: init ? {
        method: init.method,
        headers: encodedHeaders,
        body: typeof init.body === 'string' ? init.body : undefined,
      } : undefined,
    }, '*');
  });
}
window.fetch = proxiedFetch;

// ── VFS bridge (legacy) ─────────────────────────────────────────────────
const fs = {
  readFile: (path) => vfsCall('readFile', [path]),
  readFileBinary: (path) => vfsCall('readFileBinary', [path]),
  writeFile: (path, content) => vfsCall('writeFile', [path, content]),
  writeFileBinary: (path, data) => vfsCallBinary('writeFileBinary', [path], data),
  readDir: (path) => vfsCall('readDir', [path]),
  exists: (path) => vfsCall('exists', [path]),
  stat: (path) => vfsCall('stat', [path]),
  mkdir: (path) => vfsCall('mkdir', [path]),
  rm: (path) => vfsCall('rm', [path]),
  fetchToFile: async (url, path) => {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('fetch ' + resp.status + ' ' + resp.statusText);
    const buf = await resp.arrayBuffer();
    await vfsCallBinary('writeFileBinary', [path], new Uint8Array(buf));
    return buf.byteLength;
  },
};

function vfsCall(op, args) {
  return new Promise((resolve, reject) => {
    const id = 'vfs-' + (++vfsIdCounter);
    pendingVfs.set(id, { resolve, reject });
    parent.postMessage({ type: 'vfs', id, op, args }, '*');
  });
}

function vfsCallBinary(op, args, binaryData) {
  return new Promise((resolve, reject) => {
    const id = 'vfs-' + (++vfsIdCounter);
    pendingVfs.set(id, { resolve, reject });
    parent.postMessage({ type: 'vfs', id, op, args, binaryData }, '*');
  });
}

// Listen for messages from parent
addEventListener('message', async (e) => {
  // Only accept messages from our parent page (the extension side panel or offscreen doc)
  if (e.source !== parent && e.source !== window) return;
  const msg = e.data;
  if (!msg || !msg.type) return;

  // ── Realm protocol: port handoff ────────────────────────────────────
  // Per-task iframes receive a MessagePort via `realm-port-init` and
  // serve all subsequent traffic on that port. Once the port is wired,
  // the iframe ignores legacy parent-window messages for this task —
  // each realm is self-contained.
  if (msg.type === 'realm-port-init') {
    const port = e.ports && e.ports[0];
    if (port) {
      bootstrapRealmPort(port);
    }
    return;
  }

  if (msg.type === 'vfs_response') {
    const pending = pendingVfs.get(msg.id);
    if (pending) {
      pendingVfs.delete(msg.id);
      if (msg.error) pending.reject(new Error(msg.error));
      else pending.resolve(msg.result);
    }
    return;
  }

  if (msg.type === 'fetch_proxy_response') {
    const pending = pendingFetch.get(msg.id);
    if (pending) {
      pendingFetch.delete(msg.id);
      if (msg.error) {
        pending.reject(new Error(msg.error));
      } else {
        // Reconstruct a Response object from the proxied data
        const body = msg.body instanceof Uint8Array ? msg.body.buffer : new ArrayBuffer(0);
        const resp = new Response(body, {
          status: msg.status ?? 200,
          statusText: msg.statusText ?? 'OK',
          headers: msg.headers ?? {},
        });
        pending.resolve(resp);
      }
    }
    return;
  }

  if (msg.type === 'har_filter') {
    // Apply HAR filter function to entries (sandbox is CSP-exempt by design)
    try {
      const filterFn = new Function('entry', `return (${msg.filterCode})(entry);`);
      const filtered = [];
      for (const entry of msg.entries) {
        try {
          const result = filterFn(entry);
          if (result === false) continue;
          if (typeof result === 'object' && result !== null) {
            filtered.push(result);
          } else {
            filtered.push(entry);
          }
        } catch (filterErr) {
          console.warn('[har_filter] Error filtering entry:', entry?.request?.url, filterErr);
          filtered.push(entry);
        }
      }
      parent.postMessage({ type: 'har_filter_result', id: msg.id, entries: filtered }, '*');
    } catch (err) {
      parent.postMessage({
        type: 'har_filter_result', id: msg.id,
        error: err instanceof Error ? err.message : String(err),
      }, '*');
    }
    return;
  }

  if (msg.type === 'exec') {
    const logs = [];
    const origLog = console.log;
    const origError = console.error;
    const origWarn = console.warn;
    const origInfo = console.info;

    console.log = (...args) => logs.push(args.map(String).join(' '));
    console.error = (...args) => logs.push('[error] ' + args.map(String).join(' '));
    console.warn = (...args) => logs.push('[warn] ' + args.map(String).join(' '));
    console.info = (...args) => logs.push(args.map(String).join(' '));

    try {
      // Sandboxed page allows Function constructor (exempt from extension CSP)
      const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
      const fn = AsyncFunction('fs', msg.code);
      const result = await fn(fs);
      const resultStr = result !== undefined ? JSON.stringify(result, null, 2) : undefined;
      parent.postMessage({ type: 'exec_result', id: msg.id, result: resultStr, logs }, '*');
    } catch (err) {
      parent.postMessage({
        type: 'exec_result', id: msg.id,
        error: err instanceof Error ? err.message : String(err),
        logs,
      }, '*');
    } finally {
      console.log = origLog;
      console.error = origError;
      console.warn = origWarn;
      console.info = origInfo;
    }
  }
});

// Announce ready BEFORE wiring the realm port. The host listens for
// this and replies with `realm-port-init` carrying a `MessagePort`.
parent.postMessage({ type: 'realm-iframe-ready' }, '*');

// ── Realm protocol: per-task RPC + execution ────────────────────────────
// Once the host transfers a port, the iframe takes init messages on it,
// runs the user code in an AsyncFunction with shims that route fs / exec /
// fetch back through `realm-rpc-req` over the same port. Mirror of
// `js-realm-worker.ts` minus the worker-only globals.
function bootstrapRealmPort(port) {
  const NODE_BUILTINS_UNAVAILABLE = new Set([
    'http','https','net','tls','dgram','dns','cluster','worker_threads',
    'child_process','crypto','os','stream','zlib','vm','v8','perf_hooks',
    'readline','repl','tty','inspector',
  ]);
  const BUILTINS_LOCAL = new Set(['fs', 'process', 'buffer']);
  // Mirrors NODE_NATIVE_PACKAGES in kernel/realm/require-guards.ts
  // (the canonical source-of-truth; js-realm-shared.ts imports from
  // there). C++-bound packages never load in the sandbox; their CDN
  // stubs hang on a transitive .node fetch instead of erroring
  // cleanly, which used to park `node -e "require('sharp')"` for
  // minutes before hitting any timeout. Keep alphabetical. The
  // mirror-parity test in `packages/webapp/tests/shell/bsh-watchdog.test.ts`
  // walks every entry from require-guards.ts and asserts it appears
  // here, so adding a package to the canonical set without mirroring
  // fails CI rather than silently re-enabling the realm hang.
  const NODE_NATIVE_PACKAGES = new Set([
    'bcrypt','better-sqlite3','canvas','cpu-features','fsevents','leveldown',
    'libxmljs','libxmljs2','node-gyp-build','node-sass','puppeteer','robotjs',
    'sass-embedded','sharp','snappy','sqlite3','tree-sitter','usb',
  ]);
  const NATIVE_PACKAGE_HINTS = {
    sharp: " Use the built-in 'convert' shell command for image work.",
    canvas: " Use the built-in 'convert' / OffscreenCanvas for image work.",
    'better-sqlite3': " Use the built-in 'sqlite3' shell command (sql.js WASM).",
    sqlite3: " Use the built-in 'sqlite3' shell command (sql.js WASM).",
    bcrypt: ' Use crypto.subtle.digest() with PBKDF2 / Argon2 in pure JS.',
    puppeteer: ' Use the built-in browser-automation shell commands.',
  };
  const LOAD_MODULE_TIMEOUT_MS = 15000;
  function nativeError(id, bareId) {
    const hint = NATIVE_PACKAGE_HINTS[bareId] || '';
    return new Error("require('" + id + "'): '" + bareId + "' is a Node native module (C++ bindings) — it cannot run in the browser sandbox." + hint);
  }
  function withTimeout(promise, ms, label) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('Timed out after ' + (ms/1000) + 's loading ' + label)), ms);
      promise.then((v) => { clearTimeout(timer); resolve(v); }, (e) => { clearTimeout(timer); reject(e); });
    });
  }

  let nextId = 1;
  const pending = new Map();

  port.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.type) return;
    if (data.type === 'realm-rpc-res') {
      const slot = pending.get(data.id);
      if (!slot) return;
      pending.delete(data.id);
      if (typeof data.error === 'string') slot.reject(new Error(data.error));
      else slot.resolve(data.result);
      return;
    }
    if (data.type === 'realm-init') {
      runRealm(data, port, pending, () => nextId++, NODE_BUILTINS_UNAVAILABLE, BUILTINS_LOCAL, NODE_NATIVE_PACKAGES, NATIVE_PACKAGE_HINTS, LOAD_MODULE_TIMEOUT_MS, nativeError, withTimeout)
        .catch((err) => {
          const message = err instanceof Error ? err.message : String(err);
          port.postMessage({ type: 'realm-error', message });
        });
    }
  });
  port.start();
}

async function runRealm(init, port, pending, nextIdFn, NODE_BUILTINS_UNAVAILABLE, BUILTINS_LOCAL, NODE_NATIVE_PACKAGES, NATIVE_PACKAGE_HINTS, LOAD_MODULE_TIMEOUT_MS, nativeError, withTimeout) {
  if (init.kind !== 'js') {
    port.postMessage({ type: 'realm-error', message: 'realm-iframe: only kind:js supported' });
    return;
  }
  const stdout = [];
  const stderr = [];
  const writeStdout = (v) => stdout.push(typeof v === 'string' ? v : String(v));
  const writeStderr = (v) => stderr.push(typeof v === 'string' ? v : String(v));
  const formatArg = (v) => {
    if (typeof v === 'string') return v;
    if (v === null || v === undefined) return String(v);
    try { return JSON.stringify(v); } catch { return String(v); }
  };
  const consoleShim = {
    log: (...a) => writeStdout(a.map(formatArg).join(' ') + '\n'),
    info: (...a) => writeStdout(a.map(formatArg).join(' ') + '\n'),
    warn: (...a) => writeStderr(a.map(formatArg).join(' ') + '\n'),
    error: (...a) => writeStderr(a.map(formatArg).join(' ') + '\n'),
  };
  const NODE_EXIT = Symbol('NODE_EXIT');
  // Stdin surface — mirror of js-realm-shared.ts. `process.stdin.read()`
  // returns the buffer once then `null` (Node EOF semantics, shared with
  // the async iterator); `toString()` is a non-consuming view. See the
  // shared module for the full rationale.
  const stdinBuffer = init.stdin ?? '';
  let stdinConsumed = false;
  const stdinShim = {
    isTTY: false,
    read() {
      if (stdinConsumed) return null;
      stdinConsumed = true;
      return stdinBuffer;
    },
    toString() { return stdinBuffer; },
    [Symbol.asyncIterator]() {
      return {
        async next() {
          if (stdinConsumed) return { value: undefined, done: true };
          stdinConsumed = true;
          return { value: stdinBuffer, done: false };
        },
      };
    },
  };
  const processShim = {
    argv: init.argv,
    env: init.env,
    cwd: () => init.cwd,
    exit: (code) => {
      const e = new Error('Process exited with code ' + (code || 0));
      e[NODE_EXIT] = Number.isFinite(code) ? Number(code) : 0;
      throw e;
    },
    stdin: stdinShim,
    stdout: { write: writeStdout },
    stderr: { write: writeStderr },
  };

  function rpcCall(channel, op, args) {
    const id = nextIdFn();
    return new Promise((resolve, reject) => {
      pending.set(id, { resolve, reject });
      port.postMessage({ type: 'realm-rpc-req', id, channel, op, args: args || [] });
    });
  }

  const fsBridge = {
    readFile: (p) => rpcCall('vfs', 'readFile', [p]),
    readFileBinary: (p) => rpcCall('vfs', 'readFileBinary', [p]),
    writeFile: (p, c) => rpcCall('vfs', 'writeFile', [p, c]),
    writeFileBinary: (p, b) => rpcCall('vfs', 'writeFileBinary', [p, b]),
    readDir: (p) => rpcCall('vfs', 'readDir', [p]),
    exists: (p) => rpcCall('vfs', 'exists', [p]),
    stat: (p) => rpcCall('vfs', 'stat', [p]),
    mkdir: (p) => rpcCall('vfs', 'mkdir', [p]),
    rm: (p) => rpcCall('vfs', 'rm', [p]),
    fetchToFile: async (url, path) => {
      const resp = await realmFetch(url);
      if (!resp.ok) throw new Error('fetch ' + resp.status + ' ' + resp.statusText);
      const bytes = new Uint8Array(await resp.arrayBuffer());
      await rpcCall('vfs', 'writeFileBinary', [path, bytes]);
      return bytes.byteLength;
    },
  };
  const execBridge = (cmd) => rpcCall('exec', 'run', [cmd]);
  async function realmFetch(input, init2) {
    const url = input instanceof Request
      ? input.url
      : input instanceof URL
        ? input.toString()
        : String(input);
    const initBag = serializeRequestInit(init2, input);
    const serialized = await rpcCall('fetch', 'request', [url, initBag]);
    const body = serialized.body && serialized.body.byteLength > 0 ? serialized.body : null;
    const resp = new Response(body, {
      status: serialized.status,
      statusText: serialized.statusText,
      headers: serialized.headers,
    });
    Object.defineProperty(resp, 'url', { value: serialized.url || url });
    return resp;
  }
  function serializeRequestInit(initIn, input) {
    if (!initIn && !(input instanceof Request)) return undefined;
    const fromReq = input instanceof Request ? input : null;
    const method = (initIn && initIn.method) || (fromReq && fromReq.method) || 'GET';
    const headers = {};
    if (initIn && initIn.headers) {
      if (initIn.headers instanceof Headers) {
        initIn.headers.forEach((v, k) => { headers[k] = v; });
      } else if (Array.isArray(initIn.headers)) {
        for (const [k, v] of initIn.headers) headers[k] = v;
      } else {
        Object.assign(headers, initIn.headers);
      }
    } else if (fromReq) {
      fromReq.headers.forEach((v, k) => { headers[k] = v; });
    }
    let body;
    if (initIn && initIn.body !== undefined && initIn.body !== null && initIn.body !== '') {
      body = typeof initIn.body === 'string' ? initIn.body : String(initIn.body);
    }
    return { method: String(method).toUpperCase(), headers, body };
  }

  // require() — pre-fetch from esm.sh + indirect Function constructor
  // for non-import paths in the sandbox context (matches the legacy
  // extension behavior).
  const requireCache = Object.create(null);
  const re = /\brequire\s*\(\s*(['"`])([^'"`\s]+)\1\s*\)/g;
  const idsFound = new Set();
  let m;
  while ((m = re.exec(init.code)) !== null) idsFound.add(m[2]);
  const filtered = [...idsFound]
    .map((s) => s.startsWith('node:') ? s.slice(5) : s)
    .filter((s) => !BUILTINS_LOCAL.has(s) && !NODE_BUILTINS_UNAVAILABLE.has(s));
  const nativeIds = filtered.filter((s) => NODE_NATIVE_PACKAGES.has(s));
  const loadable = filtered.filter((s) => !NODE_NATIVE_PACKAGES.has(s));
  for (const id of nativeIds) {
    writeStderr("Warning: " + nativeError(id, id).message + "\n");
  }
  if (loadable.length > 0) {
    const results = await Promise.allSettled(loadable.map(async (id) => {
      const fetchAndEval = async () => {
        const url = 'https://cdn.jsdelivr.net/npm/' + id;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status + ' fetching ' + url);
        const text = await resp.text();
        const mod = { exports: {} };
        try {
          // Indirect Function call works inside the sandbox CSP.
          // The call is for its side effects on `mod.exports`; the
          // return value is discarded — `void` makes that explicit
          // for static-analysis tools that flag bare side-effecting
          // calls as "expression has no effect".
          void (0, Function)('module', 'exports', text)(mod, mod.exports);
        } catch(fnErr) {
          throw new Error('Failed to execute module ' + id + ': ' + (fnErr instanceof Error ? fnErr.message : String(fnErr)));
        }
        return Object.keys(mod.exports).length > 0 ? mod.exports : (self[id] || mod.exports);
      };
      // 15s ceiling per require — CDN stubs that chain into
      // unresolvable transitive imports (the original sharp hang)
      // are now bounded instead of parking the realm.
      requireCache[id] = await withTimeout(fetchAndEval(), LOAD_MODULE_TIMEOUT_MS, "require('" + id + "')");
    }));
    for (let i = 0; i < results.length; i++) {
      if (results[i].status === 'rejected') {
        writeStderr("Warning: failed to pre-load require('" + loadable[i] + "'): " + results[i].reason + "\n");
      }
    }
  }
  const requireShim = (id) => {
    const bareId = id.startsWith('node:') ? id.slice(5) : id;
    if (bareId === 'fs') return fsBridge;
    if (bareId === 'process') return processShim;
    if (bareId === 'buffer') return { Buffer: globalThis.Buffer };
    if (NODE_BUILTINS_UNAVAILABLE.has(bareId)) {
      const hints = { http: ' Use fetch() instead.', https: ' Use fetch() instead.', child_process: ' Use exec() which is available as a shell bridge.', crypto: ' Use globalThis.crypto (Web Crypto API) instead.' };
      throw new Error("require('" + id + "'): Node built-in '" + bareId + "' is not available in the browser environment." + (hints[bareId] || ''));
    }
    if (NODE_NATIVE_PACKAGES.has(bareId)) {
      throw nativeError(id, bareId);
    }
    if (id in requireCache) return requireCache[id];
    if (bareId in requireCache) return requireCache[bareId];
    throw new Error("require('" + id + "'): module not pre-loaded. Use a string literal so it can be pre-fetched.");
  };
  const moduleShim = { exports: {}, filename: init.filename };

  let exitCode = 0;
  try {
    const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
    const fn = new AsyncFunction(
      'fs', 'process', 'console', 'require', 'module', 'exports', 'exec', 'fetch',
      '"use strict";\n' + init.code
    );
    await fn(fsBridge, processShim, consoleShim, requireShim, moduleShim, moduleShim.exports, execBridge, realmFetch);
  } catch (err) {
    if (err && typeof err === 'object' && NODE_EXIT in err) {
      exitCode = err[NODE_EXIT];
    } else {
      const message = err instanceof Error ? (err.stack || err.message) : String(err);
      writeStderr(message + '\n');
      exitCode = 1;
    }
  }
  port.postMessage({ type: 'realm-done', stdout: stdout.join(''), stderr: stderr.join(''), exitCode });
}
</script>
</head>
<body></body>
</html>
