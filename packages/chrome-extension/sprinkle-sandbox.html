<!DOCTYPE html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: auto; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
<script src="slicc-editor.js"></script>
<script src="slicc-diff.js"></script>
<script src="lucide-icons.js"></script>
<script>
/**
 * Sprinkle Sandbox — CSP-exempt page for rendering .shtml sprinkles
 * in Chrome extension mode. Receives content via postMessage from the
 * parent page (side panel), executes scripts freely, and relays
 * bridge API calls back to the parent.
 *
 * IMPORTANT: Chrome's manifest sandbox creates a unique opaque origin.
 * Closure variables inside IIFEs are NOT reliably shared between the
 * initial script execution and dynamically created scripts. All shared
 * state MUST live on `window` to be accessible from sprinkle scripts.
 *
 * NOTE: document.body.innerHTML usage below is intentional — sprinkle
 * content is user/agent-authored .shtml, not external input. This is
 * the same trusted-content pattern used in the CLI mode renderer.
 */

// ── Shared state on window (avoids closure scoping issues) ─────────
window.__slicc_sd = {};           // localStorage backing store
window.__slicc_listeners = new Set();
window.__slicc_name = '';
window.__slicc_state = null;

// ── localStorage polyfill ──────────────────────────────────────────
// Native localStorage throws SecurityError on opaque origins.
// This polyfill reads/writes window.__slicc_sd and proxies
// mutations to the parent page for persistence.
window.__slicc_storage = {
  getItem: function(key) {
    var v = window.__slicc_sd[key];
    return v === undefined ? null : v;
  },
  setItem: function(key, value) {
    window.__slicc_sd[key] = String(value);
    parent.postMessage({ type: 'sprinkle-storage-set', key: key, value: String(value) }, '*');
  },
  removeItem: function(key) {
    delete window.__slicc_sd[key];
    parent.postMessage({ type: 'sprinkle-storage-remove', key: key }, '*');
  },
  clear: function() {
    var keys = Object.keys(window.__slicc_sd);
    for (var i = 0; i < keys.length; i++) delete window.__slicc_sd[keys[i]];
    parent.postMessage({ type: 'sprinkle-storage-clear' }, '*');
  },
  get length() {
    return Object.keys(window.__slicc_sd).length;
  },
  key: function(index) {
    var keys = Object.keys(window.__slicc_sd);
    return index >= 0 && index < keys.length ? keys[index] : null;
  },
};

// Shadow native localStorage — try instance, then prototype
try {
  Object.defineProperty(window, 'localStorage', {
    get: function() { return window.__slicc_storage; },
    configurable: true,
  });
} catch(e) {
  console.warn('[sprinkle-sandbox] defineProperty on window failed:', e);
  try {
    Object.defineProperty(Window.prototype, 'localStorage', {
      get: function() { return window.__slicc_storage; },
      configurable: true,
    });
  } catch(e2) {
    console.warn('[sprinkle-sandbox] defineProperty on prototype failed:', e2);
  }
}

// ── Bridge proxy (globals for sprinkle scripts) ────────────────────
window.slicc = {
  get name() { return window.__slicc_name; },
  lick: function(event) {
    var action = typeof event === 'string' ? event : event.action;
    var data = typeof event === 'string' ? undefined : event.data;
    parent.postMessage({ type: 'sprinkle-lick', action: action, data: data }, '*');
  },
  on: function(event, callback) {
    if (event === 'update') window.__slicc_listeners.add(callback);
  },
  off: function(event, callback) {
    if (event === 'update') window.__slicc_listeners.delete(callback);
  },
  readFile: function(path) {
    return new Promise(function(resolve, reject) {
      var id = 'rf-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-readfile-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error));
          else resolve(event.data.content);
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-readfile', id: id, path: path }, '*');
    });
  },
  writeFile: function(path, content) {
    return new Promise(function(resolve, reject) {
      var id = 'wf-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-writefile-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error)); else resolve();
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-writefile', id: id, path: path, content: content }, '*');
    });
  },
  readDir: function(path) {
    return new Promise(function(resolve, reject) {
      var id = 'rd-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-readdir-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error)); else resolve(event.data.entries);
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-readdir', id: id, path: path }, '*');
    });
  },
  exists: function(path) {
    return new Promise(function(resolve, reject) {
      var id = 'ex-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-exists-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error)); else resolve(event.data.exists);
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-exists', id: id, path: path }, '*');
    });
  },
  stat: function(path) {
    return new Promise(function(resolve, reject) {
      var id = 'st-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-stat-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error)); else resolve(event.data.stat);
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-stat', id: id, path: path }, '*');
    });
  },
  mkdir: function(path) {
    return new Promise(function(resolve, reject) {
      var id = 'mk-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-mkdir-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error)); else resolve();
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-mkdir', id: id, path: path }, '*');
    });
  },
  rm: function(path) {
    return new Promise(function(resolve, reject) {
      var id = 'rm-' + Math.random().toString(36).slice(2);
      function handler(event) {
        if (event.data && event.data.type === 'sprinkle-rm-response' && event.data.id === id) {
          removeEventListener('message', handler);
          if (event.data.error) reject(new Error(event.data.error)); else resolve();
        }
      }
      addEventListener('message', handler);
      parent.postMessage({ type: 'sprinkle-rm', id: id, path: path }, '*');
    });
  },
  screenshot: function(selector) {
    return new Promise(function(resolve, reject) {
      try {
        var target = selector ? document.querySelector(selector) : document.body;
        if (!target) { reject(new Error('Element not found: ' + selector)); return; }
        var rect = target.getBoundingClientRect();
        var w = Math.ceil(rect.width);
        var h = Math.ceil(rect.height);
        if (w === 0 || h === 0) { reject(new Error('Element has zero dimensions')); return; }
        var canvas = document.createElement('canvas');
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        var ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        var clone = target.cloneNode(true);
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '">' +
          '<foreignObject width="100%" height="100%">' +
          new XMLSerializer().serializeToString(clone) +
          '</foreignObject></svg>';
        var img = new Image();
        img.onload = function() { ctx.drawImage(img, 0, 0); resolve(canvas.toDataURL('image/png')); };
        img.onerror = function() { reject(new Error('Screenshot rendering failed')); };
        img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      } catch(e) { reject(e); }
    });
  },
  setState: function(data) {
    window.__slicc_state = data;
    parent.postMessage({ type: 'sprinkle-set-state', data: data }, '*');
  },
  getState: function() {
    return window.__slicc_state;
  },
  open: function(path, opts) {
    parent.postMessage({ type: 'sprinkle-open', path: path, projectRoot: opts && opts.projectRoot || null }, '*');
  },
  close: function() {
    parent.postMessage({ type: 'sprinkle-close' }, '*');
  },
  stopCone: function() {
    parent.postMessage({ type: 'sprinkle-stop-cone' }, '*');
  },
};
window.bridge = window.slicc;

// ── Helper: inject content into a full HTML document's <head> ─────
function injectIntoHead(html, injection) {
  var headMatch = html.match(/<head\b[^>]*>/i);
  if (headMatch) {
    var pos = headMatch.index + headMatch[0].length;
    return html.slice(0, pos) + injection + html.slice(pos);
  }
  var scriptMatch = html.match(/<script\b/i);
  if (scriptMatch) {
    return html.slice(0, scriptMatch.index) + injection + html.slice(scriptMatch.index);
  }
  var htmlMatch = html.match(/<html\b[^>]*>/i);
  if (htmlMatch) {
    var pos2 = htmlMatch.index + htmlMatch[0].length;
    return html.slice(0, pos2) + injection + html.slice(pos2);
  }
  return injection + html;
}

// ── Helper: build a self-contained bridge script for nested iframe ─
function buildNestedBridgeScript(savedState, savedStorage, name, isLight) {
  var stateJson, storageJson, nameJson;
  try { stateJson = JSON.stringify(savedState || null); } catch(e) { stateJson = 'null'; }
  try { storageJson = JSON.stringify(savedStorage || {}); } catch(e) { storageJson = '{}'; }
  try { nameJson = JSON.stringify(name); } catch(e) { nameJson = '""'; }
  var isLightLit = isLight ? 'true' : 'false';

  return '(function() {' +
    'try { if (' + isLightLit + ') document.documentElement.classList.add("theme-light"); } catch(e) {}' +
    'window.__slicc_sd = ' + storageJson + ';' +
    'window.__slicc_storage = {' +
      'getItem: function(key) { var v = window.__slicc_sd[key]; return v === undefined ? null : v; },' +
      'setItem: function(key, value) { window.__slicc_sd[key] = String(value); parent.postMessage({ type: "sprinkle-storage-set", key: key, value: String(value) }, "*"); },' +
      'removeItem: function(key) { delete window.__slicc_sd[key]; parent.postMessage({ type: "sprinkle-storage-remove", key: key }, "*"); },' +
      'clear: function() { var ks = Object.keys(window.__slicc_sd); for (var i = 0; i < ks.length; i++) delete window.__slicc_sd[ks[i]]; parent.postMessage({ type: "sprinkle-storage-clear" }, "*"); },' +
      'get length() { return Object.keys(window.__slicc_sd).length; },' +
      'key: function(index) { var ks = Object.keys(window.__slicc_sd); return index >= 0 && index < ks.length ? ks[index] : null; }' +
    '};' +
    'try { Object.defineProperty(window, "localStorage", { get: function() { return window.__slicc_storage; }, configurable: true }); } catch(e) {' +
      'try { Object.defineProperty(Window.prototype, "localStorage", { get: function() { return window.__slicc_storage; }, configurable: true }); } catch(e2) {}' +
    '}' +
    'window.__slicc_listeners = new Set();' +
    'window.__slicc_name = ' + nameJson + ';' +
    'window.__slicc_state = ' + stateJson + ';' +
    'var _cbId = 0, _cbs = {};' +
    'function _vfsCall(type, params, extractResult) {' +
      'return new Promise(function(resolve, reject) {' +
        'var id = ++_cbId;' +
        '_cbs[id] = function(msg) { if (msg.error) reject(new Error(msg.error)); else resolve(extractResult ? extractResult(msg) : undefined); };' +
        'var m = { type: type, id: id };' +
        'if (params) { for (var k in params) m[k] = params[k]; }' +
        'parent.postMessage(m, "*");' +
      '});' +
    '}' +
    'window.slicc = {' +
      'get name() { return window.__slicc_name; },' +
      'lick: function(event) {' +
        'var action = typeof event === "string" ? event : event.action;' +
        'var data = typeof event === "string" ? undefined : event.data;' +
        'parent.postMessage({ type: "sprinkle-lick", action: action, data: data }, "*");' +
      '},' +
      'on: function(event, callback) { if (event === "update") window.__slicc_listeners.add(callback); },' +
      'off: function(event, callback) { if (event === "update") window.__slicc_listeners.delete(callback); },' +
      'readFile: function(path) { return _vfsCall("sprinkle-readfile", { path: path }, function(m) { return m.content; }); },' +
      'writeFile: function(path, content) { return _vfsCall("sprinkle-writefile", { path: path, content: content }); },' +
      'readDir: function(path) { return _vfsCall("sprinkle-readdir", { path: path }, function(m) { return m.entries; }); },' +
      'exists: function(path) { return _vfsCall("sprinkle-exists", { path: path }, function(m) { return m.exists; }); },' +
      'stat: function(path) { return _vfsCall("sprinkle-stat", { path: path }, function(m) { return m.stat; }); },' +
      'mkdir: function(path) { return _vfsCall("sprinkle-mkdir", { path: path }); },' +
      'rm: function(path) { return _vfsCall("sprinkle-rm", { path: path }); },' +
      'screenshot: function(selector) {' +
        'return new Promise(function(resolve, reject) {' +
          'try {' +
            'var target = selector ? document.querySelector(selector) : document.body;' +
            'if (!target) { reject(new Error("Element not found: " + selector)); return; }' +
            'var rect = target.getBoundingClientRect();' +
            'var w = Math.ceil(rect.width); var h = Math.ceil(rect.height);' +
            'if (w === 0 || h === 0) { reject(new Error("Element has zero dimensions")); return; }' +
            'var canvas = document.createElement("canvas");' +
            'var dpr = window.devicePixelRatio || 1;' +
            'canvas.width = w * dpr; canvas.height = h * dpr;' +
            'var ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr);' +
            'var clone = target.cloneNode(true);' +
            'var svg = \'<svg xmlns="http://www.w3.org/2000/svg" width="\' + w + \'" height="\' + h + \'">\' +' +
              '\'<foreignObject width="100%" height="100%">\' +' +
              'new XMLSerializer().serializeToString(clone) +' +
              '\'</foreignObject></svg>\';' +
            'var img = new Image();' +
            'img.onload = function() { ctx.drawImage(img, 0, 0); resolve(canvas.toDataURL("image/png")); };' +
            'img.onerror = function() { reject(new Error("Screenshot rendering failed")); };' +
            'img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);' +
          '} catch(e) { reject(e); }' +
        '});' +
      '},' +
      'setState: function(data) { window.__slicc_state = data; parent.postMessage({ type: "sprinkle-set-state", data: data }, "*"); },' +
      'getState: function() { return window.__slicc_state; },' +
      'open: function(path, opts) { parent.postMessage({ type: "sprinkle-open", path: path, projectRoot: opts && opts.projectRoot || null }, "*"); },' +
      'close: function() { parent.postMessage({ type: "sprinkle-close" }, "*"); },' +
      'stopCone: function() { parent.postMessage({ type: "sprinkle-stop-cone" }, "*"); }' +
    '};' +
    'window.bridge = window.slicc;' +
    'addEventListener("message", function(e) {' +
      'var msg = e.data;' +
      'if (!msg || !msg.type) return;' +
      'if (msg.type === "sprinkle-update") {' +
        'window.__slicc_listeners.forEach(function(cb) { try { cb(msg.data); } catch(err) {} });' +
      '} else if (msg.type === "slicc-theme") {' +
        'document.documentElement.classList.toggle("theme-light", !!msg.isLight);' +
      '} else if (msg.id && _cbs[msg.id]) {' +
        'var cb = _cbs[msg.id]; delete _cbs[msg.id]; cb(msg);' +
      '}' +
    '});' +
  '})();';
}

// ── Message handler ────────────────────────────────────────────────
addEventListener('message', function(e) {
  // Accept messages from parent (extension page) and from our nested child iframe
  if (e.source !== parent && e.source !== (window.__slicc_childIframe && window.__slicc_childIframe.contentWindow)) return;
  var msg = e.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'slicc-theme') {
    document.documentElement.classList.toggle('theme-light', !!msg.isLight);
    if (window.__slicc_childIframe && window.__slicc_childIframe.contentWindow) {
      window.__slicc_childIframe.contentWindow.postMessage(msg, '*');
    }
    return;
  }

  // Forward arbitrary `slicc-*` messages from the parent (panel) into
  // the nested srcdoc iframe so dip listeners can receive them. The
  // standalone path lets the parent post directly to the dip iframe;
  // in extension mode the sandbox sits in between, so we relay here.
  // Examples used by the welcome flow: `slicc-providers`,
  // `slicc-already-connected`, `slicc-connect-result`.
  if (e.source === parent && typeof msg.type === 'string' && msg.type.indexOf('slicc-') === 0) {
    if (window.__slicc_childIframe && window.__slicc_childIframe.contentWindow) {
      window.__slicc_childIframe.contentWindow.postMessage(msg, '*');
    }
    return;
  }

  // Streaming-draft body updates: the parent posts incremental shtml
  // content while the agent is still writing the block. The nested
  // iframe's DRAFT_BRIDGE_EXTENSION listener swaps document.body.innerHTML
  // on each message. We just relay — the child does the actual work.
  if (e.source === parent && msg.type === 'dip-draft-update') {
    if (window.__slicc_childIframe && window.__slicc_childIframe.contentWindow) {
      window.__slicc_childIframe.contentWindow.postMessage(msg, '*');
    }
    return;
  }

  if (msg.type === 'sprinkle-render') {
    // Apply initial theme class so CSS variables resolve correctly on first paint.
    if (typeof msg.isLight === 'boolean') {
      document.documentElement.classList.toggle('theme-light', msg.isLight);
    }
    window.__slicc_name = msg.name || '';
    window.__slicc_state = msg.savedState || null;

    // Restore persisted localStorage entries from the parent page
    if (msg.savedStorage && typeof msg.savedStorage === 'object') {
      var savedKeys = Object.keys(msg.savedStorage);
      for (var si = 0; si < savedKeys.length; si++) {
        window.__slicc_sd[savedKeys[si]] = msg.savedStorage[savedKeys[si]];
      }
    }

    if (msg.fullDoc) {
      // ── Full-document mode: render in a nested srcdoc iframe ──────
      // The sandbox is CSP-exempt, so the nested iframe's inline scripts
      // execute freely. We inject bridge + localStorage polyfill into
      // the full document HTML, then relay messages between parent and child.
      var bridgeScript = buildNestedBridgeScript(msg.savedState, msg.savedStorage, msg.name || '', !!msg.isLight);
      var themeTag = msg.themeCSS ? '<style>' + msg.themeCSS + '</style>' : '';
      // Escape closing script tags in inlined bundles to prevent premature tag termination
      function escapeForScript(code) { return code.replace(/<\/script/gi, '<\\/script'); }
      var editorTag = msg.editorScript ? '<script>' + escapeForScript(msg.editorScript) + '<\/script>' : '';
      var diffTag = msg.diffScript ? '<script>' + escapeForScript(msg.diffScript) + '<\/script>' : '';
      var lucideTag = msg.lucideScript ? '<script>' + escapeForScript(msg.lucideScript) + '<\/script>' : '';
      var injection = '<script>' + bridgeScript + '<\/script>' + themeTag + editorTag + diffTag + lucideTag;
      var modifiedHtml = injectIntoHead(msg.content, injection);

      while (document.body.firstChild) document.body.removeChild(document.body.firstChild);
      var childIframe = document.createElement('iframe');
      childIframe.setAttribute('sandbox', 'allow-scripts');
      childIframe.style.cssText = 'width: 100%; height: 100%; border: none;';
      childIframe.srcdoc = modifiedHtml;
      document.body.appendChild(childIframe);

      window.__slicc_childIframe = childIframe;

      parent.postMessage({ type: 'sprinkle-rendered' }, '*');
    } else {
      // ── Partial-content mode (existing path) ──────────────────────

      // Inject parent page's CSS custom properties (theme tokens)
      if (msg.themeCSS) {
        var themeStyle = document.createElement('style');
        themeStyle.textContent = msg.themeCSS;
        document.head.appendChild(themeStyle);
      }

      // Render the SHTML content (trusted user/agent-authored sprinkle)
      // eslint-disable-next-line no-unsanitized/property -- trusted content, same as CLI renderer
      document.body.innerHTML = msg.content;

      // Auto-set width on .fill elements
      var fills = document.querySelectorAll('.fill[data-value]');
      for (var i = 0; i < fills.length; i++) {
        var v = parseFloat(fills[i].getAttribute('data-value') || '0');
        if (v >= 0 && v <= 100) fills[i].style.width = v + '%';
      }

      // Execute scripts (sandbox is CSP-exempt)
      // IMPORTANT: scope to body — document.querySelectorAll would also grab
      // the head script, re-execute it, and reset all window state.
      var deadScripts = Array.from(document.body.querySelectorAll('script'));
      var __fid = 0;

      function fetchScriptViaRelay(url) {
        return new Promise(function(resolve, reject) {
          var id = 'fs-' + (++__fid);
          var timer = setTimeout(function() {
            removeEventListener('message', handler);
            reject(new Error('Fetch timeout for ' + url));
          }, 30000);
          function handler(event) {
            if (event.data && event.data.type === 'sprinkle-fetch-script-response' && event.data.id === id) {
              clearTimeout(timer);
              removeEventListener('message', handler);
              if (event.data.error) reject(new Error(event.data.error));
              else resolve(event.data.text);
            }
          }
          addEventListener('message', handler);
          parent.postMessage({ type: 'sprinkle-fetch-script', id: id, url: url }, '*');
        });
      }

      (async function executeScripts() {
        for (var j = 0; j < deadScripts.length; j++) {
          var dead = deadScripts[j];
          dead.remove();
          var live = document.createElement('script');
          for (var k = 0; k < dead.attributes.length; k++) {
            if (dead.attributes[k].name === 'src') continue;
            live.setAttribute(dead.attributes[k].name, dead.attributes[k].value);
          }
          if (dead.src && /^https?:\/\//.test(dead.src)) {
            try {
              var text = await fetchScriptViaRelay(dead.src);
              live.textContent = text;
            } catch (err) {
              var errMsg = err instanceof Error ? err.message : String(err);
              live.textContent = "console.error('[sprinkle] Failed to load " + dead.src + ": " + errMsg.replace(/'/g, "\\'") + "')";
            }
          } else if (!dead.src) {
            live.textContent = dead.textContent;
          } else {
            live.textContent = "console.warn('[sprinkle] Skipped script with unsupported src: " + dead.getAttribute('src') + "')";
          }
          document.body.appendChild(live);
        }
        if (window.LucideIcons) window.LucideIcons.render();
        parent.postMessage({ type: 'sprinkle-rendered' }, '*');
      })();
    }
  }

  if (msg.type === 'sprinkle-update') {
    if (window.__slicc_childIframe && window.__slicc_childIframe.contentWindow) {
      window.__slicc_childIframe.contentWindow.postMessage({ type: 'sprinkle-update', data: msg.data }, '*');
    }
    window.__slicc_listeners.forEach(function(cb) {
      try { cb(msg.data); } catch(e) { /* ignore */ }
    });
  }

  // Forward VFS responses to nested child iframe
  var responseTypes = [
    'sprinkle-readfile-response', 'sprinkle-writefile-response',
    'sprinkle-readdir-response', 'sprinkle-exists-response',
    'sprinkle-stat-response', 'sprinkle-mkdir-response', 'sprinkle-rm-response',
    'sprinkle-fetch-script-response',
    'dip-readfile-response', 'dip-exists-response', 'dip-stat-response'
  ];
  if (responseTypes.indexOf(msg.type) !== -1) {
    if (window.__slicc_childIframe && window.__slicc_childIframe.contentWindow) {
      window.__slicc_childIframe.contentWindow.postMessage(msg, '*');
    }
  }

  // ── Dip rendering (extension mode) ─────────────────────
  if (msg.type === 'dip-render') {
    while (document.body.firstChild) document.body.removeChild(document.body.firstChild);
    var inlineIframe = document.createElement('iframe');
    inlineIframe.setAttribute('sandbox', 'allow-scripts');
    inlineIframe.style.cssText = 'width: 100%; height: 100%; border: none; overflow: hidden;';
    document.body.style.overflow = 'hidden';
    inlineIframe.srcdoc = msg.srcdoc;
    document.body.appendChild(inlineIframe);
    window.__slicc_childIframe = inlineIframe;
  }

  // ── Streaming-draft dip rendering (extension mode) ─────
  // Same shape as `dip-render`, but the inner iframe is non-interactive
  // (`pointer-events: none`) until stream end — a final `dip-render`
  // replaces this draft once the cone finishes the block. The srcdoc
  // already includes the DRAFT_BRIDGE_EXTENSION listener, so subsequent
  // `dip-draft-update` messages relayed from the parent can swap the
  // body content without touching the iframe wrapper.
  if (msg.type === 'dip-draft-render') {
    while (document.body.firstChild) document.body.removeChild(document.body.firstChild);
    var draftIframe = document.createElement('iframe');
    draftIframe.setAttribute('sandbox', 'allow-scripts');
    draftIframe.style.cssText =
      'width: 100%; height: 100%; border: none; overflow: hidden; pointer-events: none;';
    document.body.style.overflow = 'hidden';
    draftIframe.srcdoc = msg.srcdoc;
    document.body.appendChild(draftIframe);
    window.__slicc_childIframe = draftIframe;
  }

  // Relay bridge messages FROM the nested child iframe TO the extension page.
  if (window.__slicc_childIframe && e.source === window.__slicc_childIframe.contentWindow) {
    var bridgeTypes = [
      'sprinkle-lick', 'sprinkle-set-state', 'sprinkle-close', 'sprinkle-stop-cone',
      'sprinkle-open', 'sprinkle-readfile',
      'sprinkle-writefile', 'sprinkle-readdir', 'sprinkle-exists',
      'sprinkle-stat', 'sprinkle-mkdir', 'sprinkle-rm',
      'sprinkle-storage-set', 'sprinkle-storage-remove', 'sprinkle-storage-clear',
      'sprinkle-fetch-script',
      'dip-lick', 'dip-height', 'dip-open-link',
      'dip-readfile', 'dip-exists', 'dip-stat'
    ];
    if (bridgeTypes.indexOf(msg.type) !== -1) {
      parent.postMessage(msg, '*');
    }
  }
});
