name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [automation/planning-artifact-cleanup]
  merge_group:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      webapp: ${{ steps.filter.outputs.webapp }}
      vfs-root: ${{ steps.filter.outputs.vfs-root }}
      assets: ${{ steps.filter.outputs.assets }}
      node-server: ${{ steps.filter.outputs.node-server }}
      extension: ${{ steps.filter.outputs.extension }}
      cloudflare-worker: ${{ steps.filter.outputs.cloudflare-worker }}
      swift-server: ${{ steps.filter.outputs.swift-server }}
      swift-launcher: ${{ steps.filter.outputs.swift-launcher }}
      ios-app: ${{ steps.filter.outputs.ios-app }}
      root-config: ${{ steps.filter.outputs.root-config }}
      is-queue-leader: ${{ steps.queue-position.outputs.leader }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            webapp:
              - 'packages/webapp/**'
            vfs-root:
              - 'packages/vfs-root/**'
            assets:
              - 'packages/assets/**'
            node-server:
              - 'packages/node-server/**'
            extension:
              - 'packages/chrome-extension/**'
            cloudflare-worker:
              - 'packages/cloudflare-worker/**'
            swift-server:
              - 'packages/swift-server/**'
            swift-launcher:
              - 'packages/swift-launcher/**'
            ios-app:
              - 'packages/ios-app/**'
            root-config:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vitest*.config.*'
              - '.github/workflows/ci.yml'
      - name: Check merge queue position
        id: queue-position
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "leader=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Extract PR number from merge queue branch name (gh-readonly-queue/main/pr-NNN-sha)
          PR_NUMBER=$(echo "${{ github.event.merge_group.head_ref }}" | grep -oP 'pr-\K[0-9]+')
          if [ -z "$PR_NUMBER" ]; then
            echo "leader=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          POSITION=$(gh api graphql -f query='{ repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") { mergeQueue(branch: "main") { entries(first: 20) { nodes { position pullRequest { number } } } } } }' --jq ".data.repository.mergeQueue.entries.nodes[] | select(.pullRequest.number == $PR_NUMBER) | .position" 2>/dev/null || echo "")
          if [ "$POSITION" = "1" ] || [ -z "$POSITION" ]; then
            echo "leader=true" >> "$GITHUB_OUTPUT"
            echo "Queue position: $POSITION (leader)"
          else
            echo "leader=false" >> "$GITHUB_OUTPUT"
            echo "Queue position: $POSITION (skipping expensive jobs)"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format check
        run: npx prettier --check .
      - name: Check CLAUDE.md size
        run: |
          chars=$(wc -c < CLAUDE.md)
          if [ "$chars" -gt 30000 ]; then
            echo "::error::CLAUDE.md exceeds 30,000 character limit ($chars chars). Please condense it."
            exit 1
          fi
      - name: Check agent CLAUDE.md size
        run: |
          size=$(wc -c < packages/vfs-root/shared/CLAUDE.md)
          if [ "$size" -gt 3000 ]; then
            echo "::error::packages/vfs-root/shared/CLAUDE.md exceeds 3KB limit ($size bytes). Keep agent instructions concise."
            exit 1
          fi
      - name: Dead code detection (knip)
        # Hard-fail on unused files, missing/unlisted dependencies,
        # unresolved imports, duplicate exports, and unused binaries.
        # Unused individual exports/types are NOT enforced here — they
        # often represent intentional public API surface and are
        # tracked separately via 'npm run deadcode:full'.
        # Selector flags live in package.json so the CI gate cannot
        # silently diverge from the documented local command.
        run: npm run deadcode -- --no-progress --reporter compact

  # Lightweight test matrix that re-runs the TypeScript test suites across
  # supported Node majors. The package engines field is `>=22.13.0`, so
  # any one-version pin in the heavier per-package jobs misses regressions
  # that only surface on newer runtimes (e.g. jsdom + Node >= 25 quirks
  # around vi.unstubAllGlobals + localStorage). Build/E2E stay on a single
  # Node version in the per-package jobs to keep CI time bounded.
  node-matrix-tests:
    needs: changes
    if: >-
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.node-server == 'true' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.cloudflare-worker == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24', '25']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Vitest (all projects, no coverage thresholds)
        run: npm run test
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  webapp:
    needs: changes
    if: >-
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: tsc --noEmit -p tsconfig.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:webapp
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-webapp
          path: coverage/
          if-no-files-found: ignore
      - name: Build
        run: npm run build -w @slicc/webapp
      - name: Check bundle for Node-only APIs
        run: |
          # Scan browser bundles for Node-only APIs that should never be bundled.
          # Excluded files:
          #   - pyodide:        legitimately contains Node references in dead branches
          #     (its IN_NODE detection gates the Node-only paths at runtime).
          #   - kernel-worker:  bundles pi-coding-agent's compaction module, which has
          #     the same IN_NODE detection pattern. The worker is a Web Worker
          #     context where IN_NODE is false; the Node branches are dead code at
          #     load time. Manually verified — see Phase 2 work.
          #   - py-realm-worker: hosts Pyodide, so by definition pulls the same
          #     IN_NODE-gated dead branches as pyodide-* itself.
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          MATCHES=$(grep -rlE "$FORBIDDEN" dist/ui/assets/*.js 2>/dev/null | grep -vE 'pyodide|kernel-worker|py-realm-worker' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in browser bundle:"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in webapp bundle"
      - name: Check dev deps for Node-only APIs
        working-directory: packages/webapp
        run: |
          # Force Vite to pre-bundle dependencies (same as dev server startup)
          npx vite optimize --force
          # Scan optimized deps for Node-only APIs that crash in the browser
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          MATCHES=$(grep -rlE "$FORBIDDEN" ../../node_modules/.vite/deps/*.js 2>/dev/null | grep -v pyodide || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in Vite dev-optimized deps:"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in dev-optimized deps"
      - name: Build @slicc/shared-ts (node-server runtime dependency)
        run: npm run build -w @slicc/shared-ts
      - name: Build node-server (E2E dependency)
        run: npm run build -w @slicc/node-server
      - name: E2E tests
        run: |
          npx playwright install chromium
          npm run test:e2e

  node-server:
    needs: changes
    if: >-
      needs.changes.outputs.node-server == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: tsc --noEmit -p tsconfig.cli.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:node-server
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-node-server
          path: coverage/
          if-no-files-found: ignore
      - name: Build @slicc/shared-ts (runtime dependency)
        run: npm run build -w @slicc/shared-ts
      - name: Build
        run: npm run build -w @slicc/node-server

  chrome-extension:
    needs: changes
    if: >-
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:chrome-extension
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-chrome-extension
          path: coverage/
          if-no-files-found: ignore
      - name: Build webapp (dependency)
        run: npm run build -w @slicc/webapp
      - name: Build extension
        run: npm run build -w @slicc/chrome-extension
      - name: Check bundle for Node-only APIs
        run: |
          # Scan extension bundles for Node-only APIs that should never be bundled.
          # Exclude pyodide files which legitimately contain Node references.
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          # Same exclusions as the webapp scan (see comment there).
          MATCHES=$(grep -rlE "$FORBIDDEN" dist/extension/assets/*.js 2>/dev/null | grep -vE 'pyodide|kernel-worker|py-realm-worker' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in extension bundle:"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in extension bundle"
      - name: Check dev deps for Node-only APIs
        working-directory: packages/chrome-extension
        run: |
          # Force Vite to pre-bundle dependencies (same as dev server startup)
          npx vite optimize --force
          # Scan optimized deps for Node-only APIs that crash in the browser
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          MATCHES=$(grep -rlE "$FORBIDDEN" ../../node_modules/.vite/deps/*.js 2>/dev/null | grep -v pyodide || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in Vite dev-optimized deps (extension):"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in dev-optimized deps (extension)"

  cloudflare-worker:
    needs: changes
    if: >-
      needs.changes.outputs.cloudflare-worker == 'true' ||
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build webapp for worker static assets
        run: npm run build -w @slicc/webapp
      - name: Typecheck
        run: tsc --noEmit -p tsconfig.worker.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:cloudflare-worker
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-cloudflare-worker
          path: coverage/
          if-no-files-found: ignore

      # Deploy to staging on PRs (not forks) and pushes to main.
      # `environment: staging` is required so `wrangler secret bulk` targets the
      # staging Worker. wrangler-action@v3 does not parse `--env` out of `command:`
      # for the secret upload step — it only honors the `environment:` input.
      # Without this, secrets uploaded here land on the production Worker
      # (slicc-tray-hub) instead of slicc-tray-hub-staging.
      - name: Deploy staging worker (attempt 1)
        id: deploy_attempt_1
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
          github.event_name == 'push'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
      - name: Wait before staging deploy retry 2
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 20
      - name: Deploy staging worker (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
      - name: Wait before staging deploy retry 3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 40
      - name: Deploy staging worker (attempt 3)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
      - name: Finalize staging deploy
        id: deploy
        if: steps.deploy_attempt_1.outcome == 'success' || steps.deploy_attempt_2.outcome == 'success' || steps.deploy_attempt_3.outcome == 'success'
        env:
          DEPLOYMENT_URL_1: ${{ steps.deploy_attempt_1.outputs.deployment-url }}
          DEPLOYMENT_URL_2: ${{ steps.deploy_attempt_2.outputs.deployment-url }}
          DEPLOYMENT_URL_3: ${{ steps.deploy_attempt_3.outputs.deployment-url }}
        run: |
          DEPLOYMENT_URL="${DEPLOYMENT_URL_1:-}"
          if [ -z "$DEPLOYMENT_URL" ]; then DEPLOYMENT_URL="${DEPLOYMENT_URL_2:-}"; fi
          if [ -z "$DEPLOYMENT_URL" ]; then DEPLOYMENT_URL="${DEPLOYMENT_URL_3:-}"; fi
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::Staging deploy failed after 3 attempts"
            exit 1
          fi
          echo "deployment-url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
      - name: Smoke test staging
        if: steps.deploy.outcome == 'success'
        env:
          WORKER_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if npx vitest run --project cloudflare-worker packages/cloudflare-worker/tests/deployed.test.ts; then
              exit 0
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Deployed smoke test failed after ${attempt} attempts"
              exit 1
            fi
            echo "Smoke test attempt ${attempt} failed; waiting for propagation..."
            sleep 15
          done

  swift-server:
    needs: [changes, lint]
    if: >-
      needs.lint.result == 'success' &&
      needs.changes.outputs.is-queue-leader == 'true' &&
      needs.changes.outputs.swift-server == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        run: cd packages/swift-server && swift build -c release
      - name: Test (with coverage threshold gate)
        run: |
          ./packages/dev-tools/tools/swift-coverage-check.sh \
            packages/swift-server SliccServerPackageTests 40 40 35
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-swift-server
          path: packages/swift-server/.build/coverage/
          if-no-files-found: ignore
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Dead code detection (Periphery)
        run: |
          # Informational scan; surfaces unused Swift declarations without
          # blocking PRs while existing findings get cleaned up incrementally.
          cd packages/swift-server && periphery scan --disable-update-check || true

  swift-launcher:
    needs: [changes, lint]
    if: >-
      needs.lint.result == 'success' &&
      needs.changes.outputs.is-queue-leader == 'true' &&
      (needs.changes.outputs.swift-launcher == 'true' ||
      needs.changes.outputs.swift-server == 'true' ||
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.root-config == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build webapp (dependency)
        run: npm run build -w @slicc/webapp
      - name: Build swift-server (dependency)
        run: cd packages/swift-server && swift build -c release
      - name: Test (with coverage threshold gate)
        env:
          # UpdateCheckIntegrationTests hits the real GitHub API.
          # Authenticate to lift the 60/hr unauth limit (which is shared per
          # runner IP and routinely exhausted on `macos-latest`) up to the
          # 5,000/hr authenticated limit.
          GH_TOKEN: ${{ github.token }}
        run: |
          ./packages/dev-tools/tools/swift-coverage-check.sh \
            packages/swift-launcher SliccstartPackageTests 5 5 8
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-swift-launcher
          path: packages/swift-launcher/.build/coverage/
          if-no-files-found: ignore
      - name: Build
        run: npm run build -w @slicc/swift-launcher
      - name: Upload Sliccstart.app artifact (unsigned, for PR verification)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Sliccstart-${{ github.event.pull_request.number || github.run_id }}-unsigned
          path: packages/swift-launcher/build/Sliccstart.app
          if-no-files-found: error
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Dead code detection (Periphery)
        run: |
          # Informational scan; surfaces unused Swift declarations without
          # blocking PRs while existing findings get cleaned up incrementally.
          cd packages/swift-launcher && periphery scan --disable-update-check || true

  ios-app:
    needs: [changes, lint]
    if: >-
      needs.lint.result == 'success' &&
      needs.changes.outputs.ios-app == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: cd packages/ios-app && xcodegen generate
      - name: Resolve SPM dependencies
        run: |
          cd packages/ios-app
          xcodebuild -resolvePackageDependencies \
            -project SliccFollower.xcodeproj \
            -scheme SliccFollower
      - name: Build
        run: |
          set -o pipefail
          cd packages/ios-app
          xcodebuild build \
            -project SliccFollower.xcodeproj \
            -scheme SliccFollower \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  global-install:
    needs: changes
    if: >-
      needs.changes.outputs.node-server == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build @slicc/shared-ts
        run: npm run build -w @slicc/shared-ts
      - name: Build node-server
        run: npm run build -w @slicc/node-server
      - name: Pack
        run: echo "tarball=$(npm pack --quiet | tail -1)" >> "$GITHUB_OUTPUT"
        id: pack
      - name: Test global install
        run: |
          npm install -g ./${{ steps.pack.outputs.tarball }}
          slicc --version
      - name: Test npx
        run: npx --yes "sliccy@file:./${{ steps.pack.outputs.tarball }}" --version

  # Wait for any in-progress release before allowing merge queue to land.
  # Only runs on merge_group events; skipped (= passing) for PRs.
  release-gate:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
    steps:
      - name: Wait for active release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while true; do
            ACTIVE=$(gh api "repos/${{ github.repository }}/actions/workflows/release.yml/runs?status=in_progress&per_page=1" --jq '.total_count')
            QUEUED=$(gh api "repos/${{ github.repository }}/actions/workflows/release.yml/runs?status=queued&per_page=1" --jq '.total_count')
            if [ "$ACTIVE" = "0" ] && [ "$QUEUED" = "0" ]; then
              echo "No release in progress, proceeding"
              break
            fi
            echo "Release running (active=$ACTIVE queued=$QUEUED), waiting 30s..."
            sleep 30
          done

  # Summary job — the single required status check for branch protection
  ci:
    if: always()
    needs:
      [
        changes,
        lint,
        node-matrix-tests,
        webapp,
        node-server,
        chrome-extension,
        cloudflare-worker,
        global-install,
        swift-launcher,
        swift-server,
        ios-app,
        release-gate,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more jobs failed or were cancelled"
            exit 1
          fi
