name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    # macos-26 GA'd 2026-02-26 and is the image that ships Xcode 26
    # by default. Apple now rejects App Store submissions built with
    # anything older: "Validation failed (409) SDK version issue.
    # This app was built with the iOS 18.5 SDK. All iOS and iPadOS
    # apps must be built with the iOS 26 SDK or later." macos-latest
    # still resolves to macos-15 (Xcode 16.x) as of this commit.
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Import Apple certificates
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Helper: decode a base64 .p12, re-encrypt with modern AES-256
          # ciphers, then import. The repo's existing macOS Developer ID
          # cert was exported with legacy RC2-40 PKCS#12 encryption which
          # newer macOS-arm64 runners' `security import` rejects with
          # "SecKeychainItemImport: Unable to decode the provided data".
          # Round-tripping via openssl normalizes that to a format
          # `security` reliably accepts.
          #
          # Mode "required" (default) errors out if the secret is empty
          # or the cert can't be decrypted; "optional" logs a warning
          # and returns 0 so the macOS pipeline isn't blocked by an iOS
          # cert that's missing or temporarily mis-set.
          import_p12() {
            local label="$1" b64="$2" pass="$3"
            local mode="${4:-required}"
            # Per-call private tempdir so the unencrypted PEM and raw
            # .p12 are wiped even if openssl / security fail under
            # `set -e`. The trap fires on every function exit (success,
            # error, or interrupt) — addressed Copilot review on
            # release.yml#L89 from PR #572.
            local tmpdir
            tmpdir="$(mktemp -d "$RUNNER_TEMP/p12-${label}.XXXXXX")"
            chmod 700 "$tmpdir"
            # shellcheck disable=SC2064
            trap "rm -rf '$tmpdir'" RETURN

            local raw="$tmpdir/raw.p12"
            local pem="$tmpdir/cert.pem"
            local norm="$tmpdir/normalized.p12"
            local errlog="$tmpdir/openssl.log"
            local size

            printf '%s' "$b64" | base64 --decode > "$raw" 2>/dev/null || true
            size="$(wc -c < "$raw" | tr -d ' ')"
            echo "  ${label}: decoded .p12 = ${size} bytes"

            if [ "$size" -eq 0 ]; then
              if [ "$mode" = "required" ]; then
                echo "::error::${label} secret is empty after base64 decode"
                return 1
              fi
              echo "::warning::${label} secret is empty — skipping import"
              return 0
            fi

            # macos-15 ran LibreSSL (decodes legacy RC2-40 / SHA-1
            # PKCS#12 natively, no `-legacy` flag and chokes on it).
            # macos-26 ships OpenSSL 3.x, which DOES require `-legacy`
            # to enable RC2-40-CBC. Try the modern call first, fall
            # back to `-legacy` only when the first call fails — that
            # way LibreSSL never runs the failing -legacy branch and
            # OpenSSL 3.x gets the legacy provider.
            if ! openssl pkcs12 -in "$raw" -nodes -out "$pem" \
                 -passin "pass:${pass}" 2>"$errlog"; then
              if ! openssl pkcs12 -in "$raw" -nodes -out "$pem" \
                   -passin "pass:${pass}" -legacy 2>>"$errlog"; then
                if [ "$mode" = "required" ]; then
                  echo "::error::openssl could not read ${label} .p12 (modern + -legacy both failed):"
                  cat "$errlog"
                  return 1
                fi
                echo "::warning::openssl could not read ${label} .p12 — skipping import"
                cat "$errlog"
                return 0
              fi
            fi

            # On OpenSSL 3.x, `-legacy` is also needed to write a
            # PKCS#12 with the modern AES-256 ciphers from a key that
            # came in via the legacy provider. Be permissive: try
            # without `-legacy` first, fall back if that errors.
            if ! openssl pkcs12 -export -in "$pem" -out "$norm" \
                 -password "pass:${pass}" \
                 -keypbe AES-256-CBC -certpbe AES-256-CBC -macalg sha256 \
                 2>"$errlog"; then
              openssl pkcs12 -export -in "$pem" -out "$norm" \
                -password "pass:${pass}" \
                -keypbe AES-256-CBC -certpbe AES-256-CBC -macalg sha256 \
                -legacy
            fi

            security import "$norm" -P "${pass}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          }

          echo "Importing Developer ID Application cert (macOS / Sliccstart)..."
          import_p12 certificate "$APPLE_CERTIFICATE_BASE64" "$APPLE_CERTIFICATE_PASSWORD" required

          if [ -n "${APPLE_DISTRIBUTION_CERT_BASE64:-}" ]; then
            echo "Importing Apple Distribution cert (iOS / SliccFollower TestFlight)..."
            import_p12 apple-distribution "$APPLE_DISTRIBUTION_CERT_BASE64" "$APPLE_DISTRIBUTION_CERT_PASSWORD" optional
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Store keychain path for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          WORKER_BASE_URL: https://www.sliccy.ai
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
          CHROME_WEB_STORE_ITEM_ID: ${{ vars.CHROME_WEB_STORE_ITEM_ID }}
          CHROME_WEB_STORE_PUBLISH_TYPE: ${{ vars.CHROME_WEB_STORE_PUBLISH_TYPE }}
          CHROME_WEB_STORE_DEPLOY_PERCENTAGE: ${{ vars.CHROME_WEB_STORE_DEPLOY_PERCENTAGE }}
          CHROME_WEB_STORE_FORCE_CANCEL_PENDING: ${{ vars.CHROME_WEB_STORE_FORCE_CANCEL_PENDING }}
          CHROME_WEB_STORE_SKIP_REVIEW: ${{ vars.CHROME_WEB_STORE_SKIP_REVIEW }}
          CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: npx semantic-release

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
